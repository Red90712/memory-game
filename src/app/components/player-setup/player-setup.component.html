<div class="setup-container">
    <h2>¡Ingrese los nombres de los jugadores!</h2>
    <form (ngSubmit)="startGame()">
      <label>Equipo Rojo</label>
      <input type="text" [(ngModel)]="redName" name="red" required />
  
      <label>Equipo Azul</label>
      <input type="text" [(ngModel)]="blueName" name="blue" required />
  
      <button type="submit">Comenzar</button>
    </form>
  </div>
